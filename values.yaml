# Default storage configuration
storage:
  storageClass: "ocs-storagecluster-cephfs" # Example: ODF CephFS
  accessMode: ReadWriteMany

huggingface:
  # For ArgoCD or CI/CD pipelines, you can leave this empty in the repo and pass it dynamically
  # as a Helm parameter (e.g., huggingface.token=hf_YOUR_TOKEN).
  token: ""
  # The name of the secret to create (or the name of the existing external secret).
  tokenSecretName: "hf-token-secret"

proxy:
  # If your cluster is behind a proxy, specify the URLs here.
  # Example: "http://proxy.example.com:8080"
  httpProxy: ""
  httpsProxy: ""
  # Comma-separated list of hosts that should exclude proxying
  noProxy: ".cluster.local,.svc,localhost,127.0.0.1"

security:
  # Enforce compliance checks before downloading
  enabled: true
  # List of approved Hugging Face license tags (e.g., apache-2.0, mit, llama3)
  allowedLicenses:
    - "apache-2.0"
    - "mit"
  # List of verified/authentic providers (repo namespaces)
  trustedProviders:
    - "Qwen"
    - "deepseek-ai"
  # Block unsafe legacy PyTorch Pickles (.bin/.pt) and require Safetensors
  requireSafetensors: true

# Security and RBAC configuration for OpenShift
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  name: "model-provisioner-sa"

rbac:
  # Specifies whether to create RBAC rules (binds the anyuid SCC in OpenShift)
  create: true

# List of models to provision or remove
models:
  # - name: qwen3-6-35b-a3b
  #   hfRepo: "Qwen/Qwen3.6-35B-A3B"
  #   pvcName: "pvc-qwen3-6-35b-a3b"
  #   size: "100Gi"
  #   state: "present" # 'present' creates the PVC and downloads the model

  - name: deepseek-ocr-2
    hfRepo: "deepseek-ai/DeepseekSeek-OCR-2"
    pvcName: "pvc-deepseek-ocr-2"
    size: "50Gi"
    state: "present"

  - name: qwen2-vl-embedding-8b
    hfRepo: "Qwen/Qwen2-VL-Embedding-8B"
    pvcName: "pvc-qwen2-vl-embedding-8b"
    size: "25Gi"
    state: "present"

  - name: qwen3-embedding-4b
    hfRepo: "Qwen/Qwen3-Embedding-4B"
    pvcName: "pvc-qwen3-embedding-4b"
    size: "15Gi"
    state: "present"
