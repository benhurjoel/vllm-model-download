{{- range .Values.models }}
{{- if eq .state "present" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "dl-%s-%s" (.name | replace "_" "-" | trunc 45) (. | toYaml | sha256sum | trunc 7) }}
  labels:
    app.kubernetes.io/name: model-provisioner
    model: {{ .name }}
spec:
  # Keeps the completed job history around for 10 minutes to review logs if needed
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-provisioner
        model: {{ .name }}
      annotations:
        # This annotation ensures that if the Pod template changes, a new Job is created.
        # This is crucial for Jobs as their Pod templates are immutable after creation.
        checksum/config: {{ . | toYaml | sha256sum }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: downloader
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              cd /tmp

              # --- Proxy Normalization ---
              # Many tools fail with "NONE/0.0" if the proxy string lacks a scheme (http://)
              normalize_proxy() {
                local p=$1
                if [ -z "$p" ]; then echo ""; return; fi
                if [[ ! $p =~ ^http:// ]] && [[ ! $p =~ ^https:// ]]; then
                  echo "http://$p"
                else
                  echo "$p"
                fi
              }

              export HTTP_PROXY=$(normalize_proxy "$HTTP_PROXY")
              export HTTPS_PROXY=$(normalize_proxy "$HTTPS_PROXY")
              export http_proxy=$(normalize_proxy "$http_proxy")
              export https_proxy=$(normalize_proxy "$https_proxy")

              # Setup trap to catch failures and write status
              trap 'echo "FAILED" > /model-data/.download_status; echo "Download disturbed/failed!"' ERR
              
              echo "IN_PROGRESS" > /model-data/.download_status

              # --- Proxy Connectivity Check ---
              CHECK_PROXY=""
              if [ ! -z "$HTTPS_PROXY" ]; then CHECK_PROXY=$HTTPS_PROXY
              elif [ ! -z "$http_proxy" ]; then CHECK_PROXY=$http_proxy
              fi

              if [ ! -z "$CHECK_PROXY" ]; then
                echo "Verifying proxy connectivity: $CHECK_PROXY"
                # Extract host and port for a TCP check
                PROXY_HOST=$(echo $CHECK_PROXY | sed -e 's|https://||' -e 's|http://||' -e 's|/.*||' | cut -d: -f1)
                PROXY_PORT=$(echo $CHECK_PROXY | sed -e 's|https://||' -e 's|http://||' -e 's|/.*||' | cut -s -d: -f2)
                PROXY_PORT=${PROXY_PORT:-8080}
                
                if ! timeout 5 bash -c "cat < /dev/tcp/$PROXY_HOST/$PROXY_PORT" > /dev/null 2>&1; then
                  echo "ERROR: Network cannot reach proxy at $PROXY_HOST:$PROXY_PORT"
                  echo "Please check if the proxy URL is correct and reachable from this namespace."
                  exit 1
                fi
                echo "Proxy is reachable."
              fi
              
              # --- Pip Installation ---
              PIP_PROXY_ARG=""
              [ ! -z "$CHECK_PROXY" ] && PIP_PROXY_ARG="--proxy $CHECK_PROXY"

              echo "Installing huggingface_hub..."
              # Use trusted-host to bypass SSL issues common with corporate proxies
              python3 -m pip install $PIP_PROXY_ARG --no-cache-dir --user -U huggingface_hub \
                --trusted-host pypi.org \
                --trusted-host pypi.python.org \
                --trusted-host files.pythonhosted.org
              
              echo "Starting download for {{ .hfRepo }}..."
              
              cat << 'EOF' > verify_and_download.py
              import os, sys
              from huggingface_hub import HfApi, snapshot_download
              
              repo_id = "{{ .hfRepo }}"
              allowed_licenses = [x.strip() for x in os.environ.get('ALLOWED_LICENSES', '').split(',') if x.strip()]
              trusted_providers = [x.strip() for x in os.environ.get('TRUSTED_PROVIDERS', '').split(',') if x.strip()]
              require_safe = os.environ.get('REQUIRE_SAFETENSORS', 'false').lower() == 'true'
              security_enabled = os.environ.get('SECURITY_ENABLED', 'false').lower() == 'true'
              
              if security_enabled:
                  print("Running compliance and security checks...")
                  api = HfApi()
                  info = api.model_info(repo_id)
                  
                  # 1. Check Provider
                  provider = repo_id.split('/')[0]
                  if trusted_providers and provider not in trusted_providers:
                      print(f"SECURITY ALERT: Provider '{provider}' is not in the trusted list. Aborting.")
                      sys.exit(1)
                      
                  # 2. Check License
                  tags = info.tags
                  licenses = [t.split(':')[1] for t in tags if t.startswith('license:')]
                  model_license = licenses[0] if licenses else "unknown"
                  if allowed_licenses and model_license not in allowed_licenses:
                      print(f"SECURITY ALERT: License '{model_license}' is not in the approved list. Aborting.")
                      sys.exit(1)
                      
                  # 3. Check Security (Safetensors)
                  if require_safe:
                      has_safe = any(f.rfilename.endswith('.safetensors') for f in info.siblings)
                      if not has_safe:
                          print("SECURITY ALERT: Model lacks safetensors. Rejecting potentially unsafe pickle formats.")
                          sys.exit(1)
                      print("Security Check Passed: Model provides safe tensors.")
              
              ignore_patterns = ["*.bin", "*.pt", "*.pth", "*.ckpt", "*.msgpack"] if require_safe else None
              print(f"Verification passed! Commencing secure download...")
              snapshot_download(repo_id=repo_id, local_dir='/model-data', ignore_patterns=ignore_patterns)
              EOF
              
              export PATH=$PATH:$(python -m site --user-base)/bin
              python /tmp/verify_and_download.py
              
              echo "SUCCESS" > /model-data/.download_status
          env:
            - name: HOME
              value: "/tmp"
            - name: HF_HOME
              value: "/tmp/hf_cache"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.huggingface.tokenSecretName }}
                  key: token
                  optional: true
            - name: SECURITY_ENABLED
              value: "{{ $.Values.security.enabled }}"
            - name: ALLOWED_LICENSES
              {{- if $.Values.security.allowedLicenses }}
              value: "{{ join "," $.Values.security.allowedLicenses }}"
              {{- else }}
              value: ""
              {{- end }}
            - name: TRUSTED_PROVIDERS
              value: "{{ join "," $.Values.security.trustedProviders }}"
            - name: REQUIRE_SAFETENSORS
              value: "{{ $.Values.security.requireSafetensors }}"
            # Standard Proxy Env Vars
            {{- if $.Values.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ $.Values.proxy.httpProxy | quote }}
            - name: http_proxy
              value: {{ $.Values.proxy.httpProxy | quote }}
            {{- end }}
            {{- if $.Values.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ $.Values.proxy.httpsProxy | quote }}
            - name: https_proxy
              value: {{ $.Values.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if $.Values.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ $.Values.proxy.noProxy | quote }}
            - name: no_proxy
              value: {{ $.Values.proxy.noProxy | quote }}
            {{- end }}
            # Node/Agent Proxy configuration
            # Note: Kubernetes env names cannot contain dashes. Using underscore.
            - name: NODE_USE_ENV_PROXY
              value: "1"
          volumeMounts:
            - name: model-pvc
              mountPath: /model-data
            - name: hf-cache
              mountPath: /tmp/hf_cache
      volumes:
        - name: model-pvc
          persistentVolumeClaim:
            claimName: {{ .pvcName }}
        - name: hf-cache
          emptyDir: {}
{{- end -}}
{{- end -}}
