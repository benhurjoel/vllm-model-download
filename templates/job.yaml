{{- range .Values.models }}
{{- if eq .state "present" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-downloader-{{ .name }}
  labels:
    app.kubernetes.io/name: model-provisioner
    model: {{ .name }}
spec:
  # Keeps the completed job history around for 10 minutes to review logs if needed
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
      containers:
        - name: downloader
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # Setup trap to catch failures and write status
              trap 'echo "FAILED" > /model-data/.download_status; echo "Download disturbed/failed!"' ERR
              
              echo "IN_PROGRESS" > /model-data/.download_status
              pip install --no-cache-dir -U huggingface_hub
              
              echo "Starting download for {{ .hfRepo }}..."
              
              cat << 'EOF' > verify_and_download.py
              import os, sys
              from huggingface_hub import HfApi, snapshot_download
              
              repo_id = "{{ .hfRepo }}"
              allowed_licenses = [x.strip() for x in os.environ.get('ALLOWED_LICENSES', '').split(',') if x.strip()]
              trusted_providers = [x.strip() for x in os.environ.get('TRUSTED_PROVIDERS', '').split(',') if x.strip()]
              require_safe = os.environ.get('REQUIRE_SAFETENSORS', 'false').lower() == 'true'
              security_enabled = os.environ.get('SECURITY_ENABLED', 'false').lower() == 'true'
              
              if security_enabled:
                  print("Running compliance and security checks...")
                  api = HfApi()
                  info = api.model_info(repo_id)
                  
                  # 1. Check Provider
                  provider = repo_id.split('/')[0]
                  if trusted_providers and provider not in trusted_providers:
                      print(f"SECURITY ALERT: Provider '{provider}' is not in the trusted list. Aborting.")
                      sys.exit(1)
                      
                  # 2. Check License
                  tags = info.tags
                  licenses = [t.split(':')[1] for t in tags if t.startswith('license:')]
                  model_license = licenses[0] if licenses else "unknown"
                  if allowed_licenses and model_license not in allowed_licenses:
                      print(f"SECURITY ALERT: License '{model_license}' is not in the approved list. Aborting.")
                      sys.exit(1)
                      
                  # 3. Check Security (Safetensors)
                  if require_safe:
                      has_safe = any(f.rfilename.endswith('.safetensors') for f in info.siblings)
                      if not has_safe:
                          print("SECURITY ALERT: Model lacks safetensors. Rejecting potentially unsafe pickle formats.")
                          sys.exit(1)
                      print("Security Check Passed: Model provides safe tensors.")
              
              ignore_patterns = ["*.bin", "*.pt", "*.pth", "*.ckpt", "*.msgpack"] if require_safe else None
              print(f"Verification passed! Commencing secure download...")
              snapshot_download(repo_id=repo_id, local_dir='/model-data', ignore_patterns=ignore_patterns)
              EOF
              
              python verify_and_download.py
              
              echo "SUCCESS" > /model-data/.download_status
          env:
            - name: HF_HOME
              value: "/tmp/hf_cache"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.huggingface.tokenSecretName }}
                  key: token
                  optional: true
            - name: SECURITY_ENABLED
              value: "{{ $.Values.security.enabled }}"
            - name: ALLOWED_LICENSES
              {{- if $.Values.security.allowedLicenses }}
              value: "{{ join "," $.Values.security.allowedLicenses }}"
              {{- else }}
              value: ""
              {{- end }}
            - name: TRUSTED_PROVIDERS
              value: "{{ join "," $.Values.security.trustedProviders }}"
            - name: REQUIRE_SAFETENSORS
              value: "{{ $.Values.security.requireSafetensors }}"
          volumeMounts:
            - name: model-pvc
              mountPath: /model-data
            - name: hf-cache
              mountPath: /tmp/hf_cache
      volumes:
        - name: model-pvc
          persistentVolumeClaim:
            claimName: {{ .pvcName }}
        - name: hf-cache
          emptyDir: {}
{{- end }}
{{- end }}
